[include plr.cfg]

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB2.0-Serial-if00-port0
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 12000
minimum_cruise_ratio: 0.5
max_z_velocity: 15
max_z_accel: 100
square_corner_velocity: 6

[virtual_sdcard]
path: /home/mks/printer_data/gcodes

[pause_resume]

[display_status]

[idle_timeout]
gcode:
    RESPOND TYPE=echo MSG="No operations in 10min!"
timeout: 600

[mcu rpi]
serial: /tmp/klipper_host_mcu

[adxl345]
cs_pin: rpi:None
spi_bus: spidev0.0

[verify_heater extruder]
max_error: 60
check_gain_time: 20
hysteresis: 5
heating_gain: 2

[verify_heater heater_bed]
max_error: 180
check_gain_time: 120
hysteresis: 5
heating_gain: 2

[resonance_tester]
accel_chip: adxl345
probe_points:
    150, 150, 20
accel_per_hz: 100
min_freq: 5
max_freq: 133
max_smoothing: 0.2
hz_per_sec: 0.5

[respond]

[gcode_arcs]
resolution: 0.1

[exclude_object]

#############################################################################################################
# GCODE MACROS
#############################################################################################################

[gcode_macro PRINT_START]
description: Full print start — heat, home, Z_TILT, mesh, purge
gcode:
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    SAVE_VARIABLE VARIABLE=was_interrupted VALUE=True
    M140 S{BED_TEMP}                    ; start bed heating
    M84 E                               ; disable E motor for probe accuracy
    G28                                 ; home all axes
    Z_TILT_ADJUST                       ; level dual Z
    G28 Z                               ; re-home Z after tilt
    M190 S{BED_TEMP}                    ; wait for bed temp
    BED_MESH_CALIBRATE                  ; probe fresh mesh
    G90
    G1 X5 Y20 Z5 F6000                  ; move to purge start position
    M109 S{EXTRUDER_TEMP}               ; heat extruder to print temp
    G92 E0
    G1 Z0.3 F600                        ; drop to purge height
    G1 Y100 E15 F500                    ; purge line forward
    G1 Y110 E2 F500                     ; short extra prime
    G92 E0
    G1 Z2.0 F3000                       ; raise Z before print

[gcode_macro PRINT_END]
description: Full print end — retract, park, shutdown
gcode:
    SAVE_VARIABLE VARIABLE=was_interrupted VALUE=False
    RUN_SHELL_COMMAND CMD=clear_plr
    clear_last_file
    G91
    G1 E-2 F500                         ; retract
    G1 Z5 F3000                         ; raise Z
    G90
    G1 X10 Y290 F6000                   ; park at rear
    M106 S0                             ; fan off
    TURN_OFF_HEATERS
    M84 X Y E                           ; disable motors (keep Z)
    RESPOND TYPE=echo MSG="Print finished!"

[gcode_macro START_PRINT]
description: Alias for PRINT_START (backwards compatibility)
gcode:
    PRINT_START {rawparams}

[gcode_macro END_PRINT]
description: Alias for PRINT_END (backwards compatibility)
gcode:
    PRINT_END

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
    CANCEL_PRINT_BASE
    SAVE_VARIABLE VARIABLE=was_interrupted VALUE=False
    RUN_SHELL_COMMAND CMD=clear_plr
    clear_last_file
    G91
    G1 E-2 F500
    G1 Z5 F3000
    G90
    G1 X10 Y290 F6000
    M106 S0
    TURN_OFF_HEATERS
    M84 X Y E
    RESPOND TYPE=echo MSG="Print cancelled!"

[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
gcode:
    RESPOND TYPE=echo MSG="Pause Print!"
    {% set x = params.X|default(10) %}
    {% set y = params.Y|default(290) %}
    {% set z = params.Z|default(10)|float %}
    {% set e = params.E|default(1) %}
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% set lift_z = z|abs %}
    {% if act_z < (max_z - lift_z) %}
        {% set z_safe = lift_z %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}
    PAUSE_BASE
    G91
    {% if printer.extruder.can_extrude|lower == 'true' %}
      G1 E-{e} F500
    {% else %}
      {action_respond_info("Extruder not hot enough")}
    {% endif %}
    {% if "xyz" in printer.toolhead.homed_axes %}
      G1 Z{z_safe}
      G90
      G1 X{x} Y{y} F6000
    {% else %}
      {action_respond_info("Printer not homed")}
    {% endif %}

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
    RESPOND TYPE=echo MSG="Resuming print!"
    {% if printer["filament_switch_sensor my_sensor"].filament_detected == True %}
        {% set e = params.E|default(1) %}
        {% if 'VELOCITY' in params|upper %}
            {% set get_params = ('VELOCITY=' + params.VELOCITY) %}
        {% else %}
            {% set get_params = "" %}
        {% endif %}
        G91
        {% if printer.extruder.can_extrude|lower == 'true' %}
          G1 E{e} F400
        {% else %}
            {action_respond_info("Extruder not hot enough")}
        {% endif %}
        RESUME_BASE {get_params}
    {% else %}
        RESPOND TYPE=echo MSG="Please insert filament in sensor!"
    {% endif %}

[gcode_macro LOAD_FILAMENT]
description: Load filament — TEMP=220
gcode:
    {% set TEMP = params.TEMP|default(220)|float %}
    M104 S{TEMP}
    RESPOND TYPE=echo MSG="Heating to {TEMP}C..."
    M109 S{TEMP}
    G91
    G1 E30 F300
    G1 E10 F150
    G90
    RESPOND TYPE=echo MSG="Filament loaded!"

[gcode_macro UNLOAD_FILAMENT]
description: Unload filament — TEMP=220
gcode:
    {% set TEMP = params.TEMP|default(220)|float %}
    M104 S{TEMP}
    RESPOND TYPE=echo MSG="Heating to {TEMP}C..."
    M109 S{TEMP}
    G91
    G1 E-30 F300
    G90
    RESPOND TYPE=echo MSG="Filament unloaded!"

[gcode_macro LED_ON]
gcode:
    SET_PIN PIN=my_led VALUE=1

[gcode_macro LED_OFF]
gcode:
    SET_PIN PIN=my_led VALUE=0

#############################################################################################################
# STEPPERS — TMC2209
#############################################################################################################

[stepper_x]
step_pin: PD15
dir_pin: PD14
enable_pin: !PC7
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
homing_retract_dist: 0
position_endstop: -12
position_min: -12
position_max: 302
homing_speed: 50
step_pulse_duration: 0.000002

[tmc2209 stepper_x]
uart_pin: PE3
run_current: 1.2
uart_address: 3
interpolate: True
driver_sgthrs: 95
stealthchop_threshold: 0
diag_pin: ^PD10

[stepper_y]
step_pin: PB7
dir_pin: PB6
enable_pin: !PB9
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
homing_retract_dist: 0
position_endstop: -6
position_min: -6
position_max: 302
homing_speed: 50
step_pulse_duration: 0.000002

[tmc2209 stepper_y]
uart_pin: PE4
run_current: 1.2
uart_address: 3
interpolate: True
driver_sgthrs: 95
stealthchop_threshold: 0
diag_pin: ^PE0

[stepper_z]
step_pin: PB3
dir_pin: !PD7
enable_pin: !PB5
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 355
position_min: -4
homing_speed: 10

[stepper_z1]
step_pin: PA7
dir_pin: !PA6
enable_pin: !PC5
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop

[extruder]
max_extrude_only_distance: 100.0
step_pin: PD1
dir_pin: !PD0
enable_pin: !PD4
microsteps: 16
rotation_distance: 4.59
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA4
control: pid
pressure_advance: 0.02
pressure_advance_smooth_time: 0.035
max_extrude_cross_section: 500
instantaneous_corner_velocity: 10
max_extrude_only_velocity: 2000
max_extrude_only_accel: 10000
pid_Kp: 24.522
pid_Ki: 1.397
pid_Kd: 107.590
min_temp: 0
max_temp: 305
min_extrude_temp: 150

[tmc2209 extruder]
uart_pin: PE7
run_current: 0.6
uart_address: 3
interpolate: True

[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA3
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 105

[probe]
pin: PD13
x_offset: 27
y_offset: -20
speed: 5.0

[filament_switch_sensor my_sensor]
switch_pin: PD11

[safe_z_home]
home_xy_position: 123, 170
speed: 80
z_hop: 5
z_hop_speed: 10

[z_tilt]
z_positions: -8, 170
             260, 170
points: 15, 170
        260, 170
speed: 200
horizontal_move_z: 5
retries: 20
retry_tolerance: 0.005

[bed_mesh]
speed: 200
horizontal_move_z: 5
mesh_min: 17, 15
mesh_max: 285, 282
probe_count: 5, 5
algorithm: bicubic
bicubic_tension: 0.3
fade_start: 0.2
fade_end: 5.0
mesh_pps: 4, 4
move_check_distance: 3

[screws_tilt_adjust]
screw1: 15, 58
screw1_name: front left screw
screw2: 243, 58
screw2_name: front right screw
screw3: 243, 290
screw3_name: rear right screw
screw4: 15, 290
screw4_name: rear left screw
horizontal_move_z: 5
speed: 200
screw_thread: CW-M4

[heater_fan hotend_fan]
pin: PE11

[multi_pin fan_pins]
pins: PE9, PE13

[fan]
pin: multi_pin:fan_pins

[output_pin my_led]
pin: PC4
pwm: 1
value: 1
cycle_time: 0.010

[controller_fan Fan_Board]
pin: PD3
fan_speed: 1.0
idle_timeout: 120
heater: heater_bed, extruder
stepper: stepper_x, stepper_y, stepper_z, stepper_z1

[input_shaper]
damping_ratio_x: 0.05
damping_ratio_y: 0.1


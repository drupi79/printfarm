# Klipper Configuration - Creality K1 Max
# Kinematics: CoreXY | Print volume: 300x300x300
# Board: GD32F303RET6 (CR4CU220812S12) + nozzle MCU (GD32F303CBT6) + leveling MCU (GD32E230F8P6)
# Extruder: Creality metal extruder upgrade — rotation_distance: 6.9 (stock — retune to 6.49 after calibration)
# Hotend: Creality Unicorn ceramic heating block, hardened steel 0.4mm quick-swap nozzle
# Leveling: prtouch v2 (piezo pressure, no probe offset)
# Homing: Sensorless X/Y (StallGuard TMC2209), Z via prtouch
# Input shaping: zv @ 49.8Hz X, zv @ 45.0Hz Y — calibrated 2026-03-19
# Pressure advance: 0.04 — needs re-tuning after Unicorn nozzle install
#
# Guilouz Helper Script files (managed on-printer by helper script, NOT in this repo):
#   Helper-Script/timelapse.cfg
#   Helper-Script/M600-support.cfg
#   Helper-Script/screws-tilt-adjust.cfg
#   Helper-Script/save-zoffset.cfg
#   Helper-Script/useful-macros.cfg
#   Helper-Script/improved-shapers/improved-shapers.cfg
#   Helper-Script/nozzle-cleaning-fan-control.cfg
#   Helper-Script/KAMP/KAMP_Settings.cfg
#
# Deploying: copy printer.cfg, gcode_macro.cfg, printer_params.cfg, sensorless.cfg
# to ~/printer_data/config/ — do not overwrite Helper-Script/ files.

#====================================================================
# INCLUDES
#====================================================================
[virtual_pins]
[include sensorless.cfg]
[include gcode_macro.cfg]
[include printer_params.cfg]
[include Helper-Script/timelapse.cfg]
[include Helper-Script/M600-support.cfg]
[include Helper-Script/screws-tilt-adjust.cfg]
[include Helper-Script/save-zoffset.cfg]
[include Helper-Script/useful-macros.cfg]
[include Helper-Script/improved-shapers/improved-shapers.cfg]
[include Helper-Script/nozzle-cleaning-fan-control.cfg]
[include Helper-Script/KAMP/KAMP_Settings.cfg]

#====================================================================
# MCU
#====================================================================
[mcu]
serial: /dev/ttyS7
baud: 230400
restart_method: command

[mcu nozzle_mcu]
serial: /dev/ttyS1
baud: 230400
restart_method: command

[mcu leveling_mcu]
serial: /dev/ttyS9
baud: 230400
restart_method: command

[mcu rpi]
serial: /tmp/klipper_host_mcu

[bl24c16f]
i2c_mcu: rpi
i2c_bus: i2c.2
i2c_speed: 400000

#====================================================================
# PRINTER
#====================================================================
[printer]
kinematics: corexy
max_velocity: 800
max_accel: 20000
max_accel_to_decel: 20000
max_z_velocity: 20
square_corner_velocity: 5.0
square_corner_max_velocity: 200.0
max_z_accel: 300

#====================================================================
# TEMPERATURE SENSORS
#====================================================================
[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor chamber_temp]
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
min_temp: 0
max_temp: 125

#====================================================================
# CHAMBER FAN TEMPERATURE CONTROL
#====================================================================
# PC0 (fan1/side fans) and PC5 (chamber thermistor) are shared with output_pin fan1
# and temperature_sensor chamber_temp respectively — duplicate_pin_override is required.
[duplicate_pin_override]
pins: PC0, PC5

[temperature_fan chamber_fan]
pin: PC0
cycle_time: 0.0100
hardware_pwm: false
max_power: 1
shutdown_speed: 0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
min_temp: 0
max_temp: 70
control: watermark
max_delta: 2
target_temp: 35.0
max_speed: 1.0
min_speed: 0.0

#====================================================================
# HEATER VERIFICATION
#====================================================================
[verify_heater extruder]
# Unicorn nozzle has different thermal mass from stock — explicit limits prevent false thermal runaway
check_gain_time: 30
hysteresis: 5
max_error: 120
heating_gain: 2

[verify_heater heater_bed]
check_gain_time: 120
heating_gain: 1.0
hysteresis: 10

#====================================================================
# STEPPERS
#====================================================================
[stepper_x]
step_pin: PC2
dir_pin: !PB9
enable_pin: !PC3
microsteps: 32
rotation_distance: 72
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 306.5
position_min: -2
position_max: 306.5
homing_speed: 36
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PA9
interpolate: True
run_current: 1.5
hold_current: 1.0
sense_resistor: 0.100
stealthchop_threshold: 0
uart_address: 3
diag_pin: ^PB12
driver_SGTHRS: 65

[stepper_y]
step_pin: PB8
dir_pin: !PB7
enable_pin: !PC3
microsteps: 32
rotation_distance: 72
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: -2
position_min: -2
position_max: 306
homing_speed: 36
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PA10
interpolate: True
run_current: 1.5
hold_current: 1.0
sense_resistor: 0.100
stealthchop_threshold: 0
uart_address: 3
diag_pin: ^PB13
driver_SGTHRS: 65

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
gear_ratio: 64:20
endstop_pin: tmc2209_stepper_z:virtual_endstop
position_endstop: 0
position_max: 305
position_min: -10
homing_speed: 10
second_homing_speed: 1
homing_retract_dist: 2.0

[tmc2209 stepper_z]
uart_pin: PA11
uart_address: 3
run_current: 0.8
diag_pin: ^PB14
stealthchop_threshold: 0
sense_resistor: 0.100
driver_SGTHRS: 0

#====================================================================
# EXTRUDER
#====================================================================
[extruder]
step_pin: nozzle_mcu:PB1
dir_pin: nozzle_mcu:PB0
enable_pin: !nozzle_mcu:PB2
microsteps: 16
rotation_distance: 6.9          # Stock — retune to 6.49 (calibrated) after current stabilises
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: nozzle_mcu:PB7
sensor_type: EPCOS 100K B57560G104F
sensor_pin: nozzle_mcu:PA0
min_temp: 0
max_temp: 320
max_extrude_only_distance: 1000.0
max_extrude_cross_section: 80
pressure_advance: 0.04           # Starting value — retune after Unicorn nozzle install
pressure_advance_smooth_time: 0.040
#control: pid
#pid_Kp: 25.013
#pid_Ki: 2.566
#pid_Kd: 60.966

[tmc2209 extruder]
uart_pin: nozzle_mcu:PB11
tx_pin: nozzle_mcu:PB10
uart_address: 3
run_current: 0.55                # Stock — retune to 0.48A after calibration (higher current causes motor heat → heat creep → clogs)
sense_resistor: 0.150
stealthchop_threshold: 0

#====================================================================
# HEATER BED
#====================================================================
[heater_bed]
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
min_temp: 0
max_temp: 125
#control: pid
#pid_Kp: 37
#pid_Ki: 0.18
#pid_Kd: 280

#====================================================================
# FANS
#====================================================================
# K1 Max uses output_pin for fans (not standard [fan]) to allow Creality's multi-fan mapping
[multi_pin heater_fans]
pins: nozzle_mcu:PB5, PB2

[heater_fan hotend_fan]
pin: multi_pin:heater_fans
heater: extruder
heater_temp: 40

[static_digital_output my_fan_output_pins]
pins: nozzle_mcu:PB6

[output_pin fan0]
pin: !nozzle_mcu:PB8      # Part cooling fan
pwm: True
cycle_time: 0.0100
hardware_pwm: false
value: 0.00
scale: 255
shutdown_value: 0.0

[output_pin fan1]
pin: PC0                  # Side fans
pwm: True
cycle_time: 0.0100
hardware_pwm: false
value: 0.00
scale: 255
shutdown_value: 0.0

[output_pin fan2]
pin: PB1                  # Auxiliary/chamber circulation fan (min usable value: 180)
pwm: True
cycle_time: 0.0100
hardware_pwm: false
value: 0.00
scale: 255
shutdown_value: 0.0

#====================================================================
# FILAMENT SENSOR
#====================================================================
[filament_switch_sensor filament_sensor_2]
pause_on_runout: true
switch_pin: !nozzle_mcu:PA10

#====================================================================
# LEDS
#====================================================================
[output_pin LED]
pin: PB0
pwm: True
cycle_time: 0.010
value: 1

[output_pin power]
pin: PC9

#====================================================================
# RESONANCE TESTER
#====================================================================
[adxl345]
cs_pin: nozzle_mcu:PA4
spi_speed: 5000000
axes_map: x,-z,y
spi_software_sclk_pin: nozzle_mcu:PA5
spi_software_mosi_pin: nozzle_mcu:PA7
spi_software_miso_pin: nozzle_mcu:PA6

[resonance_tester]
accel_chip: adxl345
accel_per_hz: 75
probe_points: 150, 150, 10

#====================================================================
# PRTOUCH LEVELING
#====================================================================
# Piezo-based, 3-MCU system — no probe offset (nozzle IS the probe)
[prtouch_v2]
pr_version: 2
step_base: 2
z_offset: 0
noz_ex_com: 0.09
tilt_corr_dis: 0.05
tri_min_hold: 6000,10000
tri_max_hold: 13000,60000
pres_cnt: 4
pres0_clk_pins: leveling_mcu:PA7
pres0_sdo_pins: leveling_mcu:PA4
pres1_clk_pins: leveling_mcu:PA6
pres1_sdo_pins: leveling_mcu:PA3
pres2_clk_pins: leveling_mcu:PA2
pres2_sdo_pins: leveling_mcu:PA0
pres3_clk_pins: leveling_mcu:PA5
pres3_sdo_pins: leveling_mcu:PA1
show_msg: False
step_swap_pin: PC10
pres_swap_pin: leveling_mcu:PB1
g28_wait_cool_down: true
pa_clr_down_mm: -0.15
clr_noz_start_x: 130
clr_noz_start_y: 303
clr_noz_len_x: 40
clr_noz_len_y: 2
speeds: 2.5,1.0
tri_hftr_cut: 2,1
tri_lftr_k1: 0.50,0.15


#====================================================================
# BED MESH
#====================================================================
[bed_mesh]
speed: 150
mesh_min: 5, 5
mesh_max: 295, 295
probe_count: 6, 6
fade_start: 5.0
fade_end: 50.0

#====================================================================
# FIRMWARE RETRACTION
#====================================================================
[firmware_retraction]
# Values match OrcaSlicer profile — allows G10/G11 firmware retraction commands
retract_length: 0.6
retract_speed: 40
unretract_extra_length: 0
unretract_speed: 40

#====================================================================
# MISC
#====================================================================
[virtual_sdcard]
path: /usr/data/printer_data/gcodes

[gcode_arcs]
resolution: 0.1

[display_status]

[pause_resume]
# recover_velocity: 500.

[exclude_object]


# Ender 7 - Klipper Configuration - OPTIMIZED
# Hardware: CoreXY | BDsensor | TZ E3 2.0 Hotend | HGX Lite Extruder
# Host: Raspberry Pi 5 4GB
# Board: STM32F103 (28KiB bootloader, USART1 PA10/PA9)
#
# CHANGES FROM ORIGINAL:
# 1. probe_count: 50,50 → 9,9  [CRITICAL - was ~83 minutes per mesh!]
# 2. safe_z_home: 125,125 → 130,130  [nozzle now at true bed center]
# 3. zero_reference_position: 125,125 → 165.5,104.5 → 130,104  [Apollo Mini shroud: x_offset 0, y_offset -26]
# 4. mesh_min: 36,26 → 40,5 → 5,5  [Apollo Mini shroud offset recalc]
# 5. mesh_max: 222,224 → 255,230 → 220,230  [Apollo Mini shroud offset recalc]
# 6. [input_shaper] removed from active config — SAVE_CONFIG owns it (avoids silent override)
#    Calibrated 2026-02-27: X=MZV@63.2Hz, Y=3hump_ei@82.2Hz (resolved 106Hz anomaly)
#    Recalibrated 2026-03-25: X=MZV@112.8Hz, Y=3hump_ei@70.4Hz (new shroud + belt retension)
# 7. CANCEL_PRINT: parks at X0 → X5  [was slamming into X endstop]
# 8. [firmware_retraction] section added
# 9. [gcode_arcs] added (resolution 0.1mm)
# 10. pressure_advance starting value added (0.04 for HGX Lite direct drive)
# 11. Load/Unload distances corrected for direct drive (was set for Bowden)
# 12. SAVE_CONFIG bed mesh cleared (last 2 rows were corrupted - re-run BED_MESH_CALIBRATE)
# 13. [exclude_object] removed (already in start.cfg)
# 14. Added [include macros.cfg]
#
# HGX LITE ROTATION_DISTANCE: 5.46 — verified by 100mm extrusion test.

#====================================================================
# INCLUDES
#====================================================================
[include mainsail.cfg]
[include start.cfg]
[include macros.cfg]
[include KAMP_Settings.cfg]
#[include adxlmcu.cfg]

#====================================================================
# MCU CONFIGURATION
#====================================================================
[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[mcu rpi]
serial: /tmp/klipper_host_mcu

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 3200         # Recalibrated 2026-03-25: MZV@112.8Hz X, 3hump_ei@70.4Hz Y (Y limits: 4400×(70.4/82.2)²≈3230)
max_z_velocity: 20
max_z_accel: 500

#====================================================================
# STEPPER MOTORS - X/Y/Z
#====================================================================
[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 32
rotation_distance: 32
endstop_pin: ^PA5
position_endstop: 0
position_max: 260
homing_speed: 50

[stepper_y]
step_pin: PB8
dir_pin: !PB7
enable_pin: !PC3
microsteps: 32
rotation_distance: 32
endstop_pin: ^PA6
position_endstop: 260
position_min: 35                # Apollo Mini shroud contacts front frame at Y=30; 5mm margin
position_max: 260
homing_speed: 50

[stepper_z]
step_pin: PB6
dir_pin: PB5
enable_pin: !PC3
rotation_distance: 8
microsteps: 16
endstop_pin: probe:z_virtual_endstop
homing_speed: 5
second_homing_speed: 3
homing_retract_speed: 2
homing_retract_dist: 5
position_min: -3.5
position_max: 280

#====================================================================
# EXTRUDER - HGX LITE DIRECT DRIVE
#====================================================================
[extruder]
step_pin: PB4
dir_pin: !PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 5.46         # Verified by 100mm extrusion test
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: Generic 3950
sensor_pin: PC5
min_temp: 0
max_temp: 320
max_extrude_only_distance: 200.0
max_extrude_cross_section: 10
min_extrude_temp: 170
pressure_advance: 0.04           # Starting value for HGX Lite direct drive - tune with PA tower

#====================================================================
# FIRMWARE RETRACTION (Direct Drive)
#====================================================================
[firmware_retraction]
retract_length: 0.6             # HGX Lite direct drive - adjust via tower test
retract_speed: 40
unretract_speed: 35
unretract_extra_length: 0

#====================================================================
# HEATED BED
#====================================================================
[heater_bed]
heater_pin: PA15
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
min_temp: 0
max_temp: 100

#====================================================================
# BDSENSOR CONFIGURATION
#====================================================================
# safe_z_home uses NOZZLE coordinates.
# To probe at bed center (130,130): nozzle must be at 130,130.
# Probe will land at: 130+0=130 (X), 130-26=104 (Y).
# Apollo Mini shroud: x_offset=0 (sensor centered on nozzle), y_offset=-26 (26mm forward of nozzle).
[BDsensor]
sda_pin: ^PB1
scl_pin: PB0
delay: 10
#z_offset: 0                    # Managed by SAVE_CONFIG (currently 0.100)
x_offset: 0
y_offset: -26
no_stop_probe:                  # Fast probing - comment out if getting mesh errors
position_endstop: 1.2
collision_homing: 1
collision_calibrate: 1
speed: 3
homing_cmd: G28
rt_sample_time: 19      # Enables RTL — samples Z every 19ms during print (hybrid mode: mesh + RTL)

#[bltouch]                      # Kept as reference - BDsensor is active
#sensor_pin: ^PB1
#control_pin: PB0
#x_offset: 35.5
#y_offset: -25.5

[safe_z_home]
home_xy_position: 130, 130      # Nozzle at true bed center (130,130 for 260x260)
speed: 80
z_hop: 10
z_hop_speed: 10

# PROBE COUNT: Was 50x50 = 2500 points (~83 minutes). Now 9x9 = 81 points (~3 min).
# LIMITS: In PROBE coordinates (probe_pos = nozzle_pos + offset).
#   BDsensor offset: x+0, y-26 (Apollo Mini shroud — sensor centered X, 26mm forward of nozzle)
#   mesh_min X=5:  nozzle at X=5 (5mm margin from edge) ✓
#   mesh_min Y=9:  nozzle at Y=35 (35-26=9; limited by shroud hitting front frame at Y=30) ✓
#   mesh_max X=220: nozzle at X=220 (probe stays on bed) ✓
#   mesh_max Y=230: nozzle at Y=256 (256-26=230, probe 30mm from Y=260 edge) ✓
# ZERO REFERENCE: probe coords when nozzle is at bed center (130,130).
#   probe_x = 130 + 0 = 130, probe_y = 130 - 26 = 104
[bed_mesh]
speed: 200
horizontal_move_z: 1
zero_reference_position: 130, 104       # Probe position when nozzle at bed center
mesh_min: 5, 9
mesh_max: 220, 230
probe_count: 9, 9                        # 81 points. Use 11,11 for max detail.
algorithm: bicubic
bicubic_tension: 0.2
fade_start: 1
fade_end: 10
fade_target: 0

[screws_tilt_adjust]
screw1: 0, 13
screw1_name: front left screw
screw2: 185, 13
screw2_name: front right screw
screw3: 185, 204
screw3_name: rear right screw
screw4: 0, 204
screw4_name: rear left screw
horizontal_move_z: 10
speed: 200
screw_thread: CW-M4

#====================================================================
# TEMPERATURE SENSORS
#====================================================================
[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
sensor_mcu: mcu

[temperature_sensor rpi_temp]
sensor_type: temperature_host
sensor_path: /sys/class/thermal/thermal_zone0/temp

#====================================================================
# FANS
#====================================================================
[fan]
pin: PA0

#====================================================================
# INPUT SHAPING (Calibrated Values)
#====================================================================
# Calibrated 2026-03-25: X=MZV@112.8Hz, Y=3hump_ei@70.4Hz (new Apollo Mini shroud + belt retension)
# Previous (2026-02-27): X=MZV@63.2Hz, Y=3hump_ei@82.2Hz
# Values stored in SAVE_CONFIG — no active [input_shaper] section to avoid silent override

#====================================================================
# ADVANCED FEATURES
#====================================================================
[filament_switch_sensor filament_sensor]
pause_on_runout: true
switch_pin: !PA4

[force_move]
enable_force_move: true

[gcode_arcs]
resolution: 0.1

#====================================================================
# PRINT_END OVERRIDE
#====================================================================
# Overrides shared start.cfg PRINT_END — lowers bed to Z=275 for print presentation
[gcode_macro PRINT_END]
description: End print - raises Z to 275 for print presentation
gcode:
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}

    # Retract and move away
    G91
    G1 E-4 F2700
    G0 X5 Y5 F5000

    # Raise Z safely (don't exceed max)
    {% if act_z < (max_z - 10) %}
        G0 Z10 F3000
    {% else %}
        G0 Z{max_z - act_z} F3000
    {% endif %}

    G90

    # Present toolhead at back of bed
    {% set y_present = printer.toolhead.axis_maximum.y|float %}
    G0 X0 Y{y_present} F5000

    # Lower bed to Z=275 for easy print removal (if not already there)
    {% if printer.toolhead.position.z < 275 %}
        G0 Z275 F1000
    {% endif %}

    # Shutdown
    TURN_OFF_HEATERS
    M107  # Fan off
    M84   # Motors off

    RESPOND MSG="Print complete!"

